<h1> Search for Pokemon! </h1>

<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <input type="text" id="searchBox" placeholder="Search...">
    <button onclick="searchThing()">Search</button>

    <div id="result"></div>

    <script>
        function searchThing() {
            const search = document.getElementById("searchBox").value.toLowerCase();
            const result = document.getElementById("result");

            if (search === "charizard") {
                result.innerHTML = `
                    <h2>Charizard</h2>
                    <p>
                        Charizard is a Fire/Flying-type Pokémon introduced in Generation I.
                        It evolves from Charmeleon and is the final evolution of Charmander.
                        Charizard is known for its powerful fire attacks and dragon-like appearance.
                        Pokédex #0006.
                    </p>
                `;
            } else {
                result.innerHTML = "<p>No results found.</p>";
            }
        }
    </script>

</body>
</html>
